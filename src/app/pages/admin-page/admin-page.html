<div class="admin-page" appBackOnEscape>
  <header class="admin-header">
    <div class="header-title-row">
      <div class="header-info">
        <h1>
          <i class="material-icons">admin_panel_settings</i>
          <span>{{ 'admin.title' | transloco }}</span>
        </h1>
        <span class="workspace-tag">Workspace</span>
      </div>
    </div>

    <nav class="admin-tabs-container">
      <div class="admin-tabs">
        @for (tab of tabs; track tab.id) {
          <button
            [class.active]="activeTab === tab.id"
            (click)="setActiveTab(tab.id)">
            <i class="material-icons">{{ tab.icon }}</i>
            <span>{{ tab.label | transloco }}</span>
          </button>
        }
      </div>
    </nav>
  </header>

  <section class="admin-content">
    @switch (activeTab) {
      @case ('profile') {
        <app-workspace-profile></app-workspace-profile>
      }
      @case ('departments') {
        <app-department-list></app-department-list>
      }
      @case ('projects') {
        <app-project-list></app-project-list>
      }
      @case ('members') {
        <app-members-admin></app-members-admin>
      }
      @case ('roles') {
        <app-role-manager></app-role-manager>
      }
      @case ('permissions') {
        <app-permission-manager></app-permission-manager>
      }
      @case ('tracker') {
        <app-tracker-admin></app-tracker-admin>
      }
    }
  </section>
</div>
