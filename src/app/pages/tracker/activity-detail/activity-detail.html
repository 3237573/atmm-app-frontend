<div class="details-card">
  <div class="card-header">
    <h3>{{ 'tracker.details.title' | transloco }}</h3>
  </div>

  <div class="apps-grid">
    @for (app of items(); track app.name) {
      <div class="app-item"
           [class.active]="selectedProject() === app.categorySlug"
           (click)="toggle.emit(app.categorySlug)">

        <div class="app-main">
          <span class="app-dot" [style.background-color]="app.color"></span>
          <span class="app-name" [title]="app.name">{{ app.name }}</span>
        </div>

        <div class="app-info">
          <span class="slug-badge">{{ app.categorySlug }}</span>
          <span class="font-mono">{{ formatDuration(app.minutes) }}</span>
        </div>
      </div>
    } @empty {
      <div class="empty-state">Нет данных за этот период</div>
    }
  </div>
</div>
