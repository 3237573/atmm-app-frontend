<ng-container *transloco="let t">
  <div class="create-container">
    <div class="page-header">
      <button class="btn-back" (click)="goBack()">
        <i class="material-icons">arrow_back</i> {{ t('dept.create.backBtn') }}
      </button>
    </div>

    <div class="form-card">
      <div class="card-header">
        <h2><i class="material-icons">add_business</i> {{ t('dept.create.title') }}</h2>
        <p>{{ t('dept.create.subtitle') }}</p>
      </div>

      <form (ngSubmit)="onSubmit()" #deptForm="ngForm">
        <div class="form-group">
          <label for="name">{{ t('dept.create.nameLabel') }}</label>
          <input
            type="text"
            id="name"
            name="name"
            [(ngModel)]="formData.name"
            required
            [placeholder]="t('dept.create.namePlaceholder')"
            class="form-input">
        </div>

        <div class="form-group">
          <label for="parent">{{ t('dept.create.parentLabel') }}</label>
          <div class="select-wrapper">
            <select
              id="parent"
              name="parentDepartmentId"
              [(ngModel)]="formData.parentDepartmentId"
              class="form-input select-styled">
              <option [ngValue]="null">{{ t('dept.create.rootOption') }}</option>
              @for (dept of departments(); track dept.id) {
                <option [value]="dept.id">{{ dept.name }}</option>
              }
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="goBack()">{{ t('dept.create.cancelBtn') }}</button>
          <button
            type="submit"
            class="btn-save"
            [disabled]="!deptForm.form.valid || loading()">
            @if (loading()) {
              <i class="material-icons spinning">refresh</i>
            } @else {
              <i class="material-icons">check</i>
            }
            <span>{{ t('dept.create.submitBtn') }}</span>
          </button>
        </div>
      </form>

      <h3>{{ t('dept.create.employeesTitle') }}</h3>

      <div class="selection-list">
        @for (m of allMembers(); track m.id) {
          <div class="selection-row">
            <label class="checkbox-row">
              <input type="checkbox"
                     [checked]="selectedMembers().has(m.id)"
                     (change)="toggleMember(m.id, $any($event.target).checked)">
              <span>{{ m.displayName }} ({{ m.email }})</span>
            </label>

            <select class="role-input form-input"
                    [disabled]="!selectedMembers().has(m.id)"
                    (change)="setRole(m.id, $any($event.target).value)">
              <option value="MEMBER">{{ t('dept.roles.MEMBER') }}</option>
              <option value="HEAD">{{ t('dept.roles.HEAD') }}</option>
            </select>
          </div>
        }
      </div>
    </div>
  </div>
</ng-container>
