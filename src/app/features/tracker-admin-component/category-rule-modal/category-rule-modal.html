<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-content rule-modal" (click)="$event.stopPropagation()">
    <div class="modal-header-with-icon">
      <i class="material-icons" style="color: #3b82f6">filter_alt</i>
      <h3>Новое правило</h3>
    </div>

    <p class="field-hint">Классификация для категории: <b>{{ categoryName() }}</b></p>

    <form [formGroup]="ruleForm" (ngSubmit)="submit()">
      <div class="form-field">
        <label>Паттерн (часть заголовка или процесса)</label>
        <div class="icon-input-group">
          <i class="material-icons">search</i>
          <input type="text" formControlName="pattern" placeholder="Например: youtube.com" autofocus>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-amber" (click)="close.emit()">Отмена</button>
        <button type="submit" class="btn btn-blue" [disabled]="ruleForm.invalid">Добавить</button>
      </div>
    </form>
  </div>
</div>
