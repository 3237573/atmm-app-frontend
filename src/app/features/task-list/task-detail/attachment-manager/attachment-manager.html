<div class="attachments-inline-container">

  <div
    class="compact-dropzone"
    [class.dragging]="isDragging()"
    [class.uploading]="isUploading()"
    [class.disabled]="attachments().length >= 3"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="attachments().length < 3 && !isUploading() && fileInput.click()"
    [title]="attachments().length >= 3 ? 'Достигнут лимит (макс. 3 файла)' : 'Перетащите файл или кликните для загрузки'">

    <input
      type="file"
      #fileInput
      (change)="onFileSelected($event)"
      style="display: none;"
      [disabled]="isUploading() || attachments().length >= 3">

    <div class="dropzone-content">
      @if (isUploading()) {
        <div class="spinner-small"></div>
        <span class="text-hint">Загрузка...</span>
      } @else {
        <i class="material-icons upload-icon">attach_file</i>
        <span class="text-hint">Вложение ({{ attachments().length }}/3)</span>
      }
    </div>
  </div>

  @if (attachments().length > 0) {
    <div class="attachments-horizontal-list">
      @for (file of attachments(); track file.id) {
        <div class="attachment-chip" title="{{ file.filename }} ({{ formatFileSize(file.fileSize) }})">
          <i class="material-icons file-icon">{{ getFileIcon(file.fileType, file.filename) }}</i>

          <a [href]="file.filePath" target="_blank" class="file-name">
            {{ file.filename }}
          </a>

          <button class="btn-delete-chip" (click)="deleteAttachment(file.id, $event)" title="Удалить">
            <i class="material-icons">close</i>
          </button>
        </div>
      }
    </div>
  } @else {
    <span class="empty-attachments-text">Нет прикрепленных файлов (до 1 МБ)</span>
  }

</div>
