<div class="chat-list-container" [class.collapsed]="isListCollapsed()" appBackOnEscape>

  <div class="chat-list-header" (click)="toggleList()">
    <span class="header-title">{{ 'menu.chat' | transloco }}</span>
    <i class="material-icons toggle-icon">
      {{ isListCollapsed() ? 'expand_more' : 'expand_less' }}
    </i>
  </div>

  <div class="search-block">
    <div class="search-wrapper">
      <i class="material-icons">search</i>
      <input
        type="text"
        [placeholder]="'chat.searchChat' | transloco"
        [(ngModel)]="searchQuery"
        (input)="onSearchChange()">
    </div>
  </div>

  <div class="rooms-scroll-area">
    @for (room of filteredRooms; track room.id) {
      <div
        class="room-item"
        [class.active]="room.id === activeRoomId"
        (click)="selectRoom(room.id)">

        <div class="room-avatar" [style.background-color]="getAvatarColor(room.id)">
          <span class="avatar-initials">{{ getAvatarInitials(room) }}</span>
        </div>

        <div class="room-details">
          <div class="room-main-info">
            <div class="room-meta">
              <span class="room-name">{{ room.name }}</span>
            </div>
          </div>
          @if (room.unreadCount > 0) {
            <div class="unread-badge">{{ room.unreadCount }}</div>
          }
        </div>
      </div>
    } @empty {
      <div class="empty-rooms">Чаты не найдены</div>
    }
  </div>

</div>
