<nav [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    @if (!isCollapsed) { <span class="logo">ATMM</span> }
    <button class="toggle-btn" (click)="toggleSidebar()">
      <svg [class.rotate-180]="isCollapsed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </button>
  </div>

  <ul>
    <li>
      <a routerLink="/members" routerLinkActive="active">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span>
        @if (!isCollapsed) { <span class="text">Members</span> }
      </a>
    </li>
    <li>
      <a routerLink="/dashboard" routerLinkActive="active">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        </span>
        @if (!isCollapsed) { <span class="text">Dashboard</span> }
      </a>
    </li>
    <li>
      <a routerLink="/tracker" routerLinkActive="active">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </span>
        @if (!isCollapsed) { <span class="text">Tracker</span> }
      </a>
    </li>
  </ul>
</nav>
