<nav (dblclick)="onNavbarDblClick($event)" appBackOnEscape>
  <ul class="nav-list">
    @for (item of menuItems(); track item.path) {
      <li>
        <a [routerLink]="item.path"
           routerLinkActive="active"
           [attr.title]="(sidebarService.isCollapsed() ? item.labelKey : null) | transloco"
        >
          <span class="icon">
            <i class="material-icons">{{ item.icon }}</i>
          </span>
          <span class="text">{{ item.labelKey | transloco }}</span>
        </a>
      </li>
    }
    <li></li>
    @if (!sidebarService.isCollapsed()) {
      <li>
        {{ currentUserName() }}
      </li>
      <li>
        {{ currentUserEmail() }}
      </li>
    }
  </ul>

  <div class="sidebar-empty-space"></div>
</nav>

<div
  class="sidebar-toggle-handle"
  (click)="toggleSidebar($event)"
  [title]="sidebarService.isCollapsed() ? 'Развернуть сайдбар' : 'Свернуть сайдбар'">
  <div class="toggle-circle">
    <i class="material-icons">
      {{ sidebarService.isCollapsed() ? 'chevron_right' : 'chevron_left' }}
    </i>
  </div>
</div>
