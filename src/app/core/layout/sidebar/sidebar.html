<nav [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    @if (!isCollapsed) { <span class="logo">ATMM</span> }
    <button class="toggle-btn" (click)="toggleSidebar()">
      <svg [class.rotate-180]="isCollapsed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </button>
  </div>

  <ul>
    <li>
      <a routerLink="/members" routerLinkActive="active">
      <span class="icon">
        <i class="material-icons">groups</i>
      </span>
        @if (!isCollapsed) { <span class="text">Members</span> }
      </a>
    </li>
    <li>
      <a routerLink="/dashboard" routerLinkActive="active">
      <span class="icon">
        <i class="material-icons">dashboard</i>
      </span>
        @if (!isCollapsed) { <span class="text">Dashboard</span> }
      </a>
    </li>
    <li>
      <a routerLink="/tracker" routerLinkActive="active">
      <span class="icon">
        <i class="material-icons">schedule</i>
      </span>
        @if (!isCollapsed) { <span class="text">Tracker</span> }
      </a>
    </li>
    <li>
      <a routerLink="/admin/tracker" routerLinkActive="active">
      <span class="icon">
        <i class="material-icons">admin_panel_settings</i>
      </span>
        @if (!isCollapsed) { <span class="text">Admin Tracker</span> }
      </a>
    </li>
  </ul>
</nav>
