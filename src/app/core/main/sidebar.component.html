<aside class="flex flex-col w-64 h-screen px-5 py-8 overflow-y-auto bg-white border-r rtl:border-r-0 rtl:border-l dark:bg-gray-900 dark:border-gray-700">
  <div class="flex items-center gap-x-2 px-2">
    <span class="text-2xl font-bold text-blue-600">APAY</span>
  </div>

  <div class="flex flex-col justify-between flex-1 mt-6">
    <nav class="flex-1 -mx-3 space-y-3">
      <a routerLink="/dashboard" routerLinkActive="bg-gray-100 dark:bg-gray-800 text-blue-600"
         class="flex items-center px-3 py-2 text-gray-600 transition-colors duration-300 transform rounded-lg dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 dark:hover:text-gray-200 hover:text-gray-700">
        <i-lucide name="layout-dashboard" class="w-5 h-5"></i-lucide>
        <span class="mx-2 text-sm font-medium">Дашборд</span>
      </a>

      <a routerLink="/tasks" routerLinkActive="bg-gray-100 dark:bg-gray-800 text-blue-600"
         class="flex items-center px-3 py-2 text-gray-600 transition-colors duration-300 transform rounded-lg dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 dark:hover:text-gray-200 hover:text-gray-700">
        <i-lucide name="check-square" class="w-5 h-5"></i-lucide>
        <span class="mx-2 text-sm font-medium">Задачи</span>
      </a>

      <a routerLink="/members" routerLinkActive="bg-gray-100 dark:bg-gray-800 text-blue-600"
         class="flex items-center px-3 py-2 text-gray-600 transition-colors duration-300 transform rounded-lg dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 dark:hover:text-gray-200 hover:text-gray-700">
        <i-lucide name="users" class="w-5 h-5"></i-lucide>
        <span class="mx-2 text-sm font-medium">Команда</span>
      </a>

      <a routerLink="/tracker" routerLinkActive="bg-gray-100 dark:bg-gray-800 text-blue-600"
         class="flex items-center px-3 py-2 text-gray-600 transition-colors duration-300 transform rounded-lg dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 dark:hover:text-gray-200 hover:text-gray-700">
        <i-lucide name="clock" class="w-5 h-5"></i-lucide>
        <span class="mx-2 text-sm font-medium">Трекер</span>
      </a>
    </nav>

    <div class="mt-6 border-t border-gray-200 dark:border-gray-700 pt-6">
      <button (click)="logout()" class="flex items-center px-3 py-2 text-red-600 transition-colors duration-300 transform rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20">
        <i-lucide name="log-out" class="w-5 h-5"></i-lucide>
        <span class="mx-2 text-sm font-medium">Выйти</span>
      </button>
    </div>
  </div>
</aside>
