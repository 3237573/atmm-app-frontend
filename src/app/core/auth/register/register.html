<div class="auth-container">
  <div class="auth-card">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <h1>ATMM</h1>
    </div>

    <h2>Создать аккаунт</h2>
    <p class="subtitle">Начните отслеживать время вашей команды</p>

    @if (error()) {
      <div class="error-message">{{ error() }}</div>
    }

    <form [formGroup]="regForm" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <div class="input-wrapper">
          <input formControlName="fullName" type="text" placeholder="Как вас зовут?" />
          <label>Ваше глобальное имя</label>
        </div>

        <div class="input-wrapper">
          <input formControlName="displayName" type="text" placeholder="Имя в компании" />
          <label>Как к вам обращаться в этой компании</label>
        </div>

        <div class="input-wrapper">
          <input formControlName="email" type="email" placeholder="Email" />
          <label>Электронная почта</label>
        </div>

        <div class="input-wrapper">
          <input formControlName="companyName" type="text" placeholder="Название компании" />
          <label>Название вашей компании</label>
        </div>

        <div class="input-wrapper">
          <input formControlName="password" type="password" placeholder="Пароль" />
          <label>Придумайте пароль (минимум 6 символов)</label>
        </div>
      </div>

      <button type="submit" [disabled]="regForm.invalid || loading()">
        @if (loading()) {
          <span class="spinner"></span>
        }
        {{ loading() ? 'Регистрация...' : 'Зарегистрироваться' }}
      </button>

      <p class="switch-auth">
        Уже есть аккаунт? <a routerLink="/login">Войти</a>
      </p>
    </form>
  </div>
</div>
