<div class="auth-container">
  <div class="auth-card">
    <h2>Вход в систему</h2>
    <p class="subtitle">Добро пожаловать обратно в ATMM</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <input formControlName="email" type="email" placeholder="Email" />
        <input formControlName="password" type="password" placeholder="Пароль" />
      </div>

      <button type="submit" [disabled]="loginForm.invalid">Войти</button>
      
      <p class="switch-auth">
        Нет аккаунта? <a routerLink="/register">Зарегистрироваться</a>
      </p>
    </form>
  </div>
</div>
