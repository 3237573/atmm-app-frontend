<div class="container">
  <div class="card">
    <div class="header">
      <div class="logo">ATMM</div>
      <div class="user">{{ email() }}</div>
    </div>

    <div class="content">
      <h2>Select workspace</h2>
      <p class="hint">Choose a company to continue</p>

      @for (company of companies(); track company.companyId) {
        <button class="company" (click)="selectCompany(company)">
          <div class="company-left">
            <!-- ✨ Используем глобальный класс avatar-role -->
            <div class="avatar-role" [class]="company.role | lowercase">
              {{ company.name.charAt(0) }}
            </div>
            <div class="company-data">
              <div class="company-name">{{ company.name }}</div>
              <div class="company-code">{{ company.code }}</div>
            </div>
          </div>
          <!-- ✨ Используем глобальный класс badge-role -->
          <span class="badge-role" [class]="company.role | lowercase">
            {{ getRoleLabel(company.role) }}
          </span>
        </button>
      }
    </div>

    <div class="footer">
      <button class="back" (click)="backToLogin()">← Switch account</button>
    </div>
  </div>
</div>
