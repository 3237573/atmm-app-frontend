# 1. ЗАДАЕМ БЭКЕНД В ОДНОМ МЕСТЕ
upstream backend_server {
    server backend:9084;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # === PWA ===
    # 1. Запрещаем браузерам кэшировать сам воркер и карту его кэша
    location ~* (ngsw-worker\.js|ngsw\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        try_files $uri =404;
    }

    # 2. Манифест приложения (задаем правильный Content-Type)
    location = /manifest.webmanifest {
        add_header Content-Type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    # =================================

    # 2. Прокси для WebSocket
    location /v1/chat/ws {
        proxy_pass http://backend_server; # Используем upstream
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade"; # Строго с маленькой буквы!
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 3. Proxy for HTTP chat requests
    location /v1/ {
        proxy_pass http://backend_server; # Используем upstream
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Прокси для старых API запросов
    location /api/ {
        proxy_pass http://backend_server; # Используем upstream
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 5. Раздача файлов из Volume
    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # 6. Роутинг Angular
    location / {
        try_files $uri $uri/ /index.html;
    }
}
