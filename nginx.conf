# nginx.conf
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 1. СТРОГО ПЕРВЫМ: Прокси для WebSocket (вебсокетам нужны особые заголовки)
    location /v1/chat/ws {
        proxy_pass http://backend:9083/v1/chat/ws; # Перенаправляем на Ktor контейнер

        # Переключение протокола на WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Стандартные заголовки для сохранения IP адресов
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Чтобы Docker/Nginx не обрывали соединение, если долго нет сообщений
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 2. Прокси для обычных HTTP запросов чата (получение комнат, истории сообщений)
    location /v1/ {
        proxy_pass http://backend:9083/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Прокси для остальных старых API запросов (если они используются)
    location /api/ {
        proxy_pass http://backend:9083/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. Прокси для загружаемых файлов (из proxy.conf.json)
    location /uploads/ {
        proxy_pass http://backend:9083/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 5. Раздача фронтенда и поддержка Angular Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статики
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
